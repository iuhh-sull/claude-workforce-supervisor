name: Test Claude Workforce

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'Install.ps1'
      - 'claude-workforce/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Install.ps1'
      - 'claude-workforce/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  fake-runtime:
    name: Portable Fake Runtime and Concurrency
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7

      - name: Verify PowerShell version
        run: $PSVersionTable.PSVersion

      - name: Parse all scripts
        run: |
          $paths = @(Get-ChildItem -LiteralPath . -Filter '*.ps1' -File -Recurse | Sort-Object FullName)
          if ($paths.Count -eq 0) { throw 'No PowerShell scripts were found.' }
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [void][Management.Automation.Language.Parser]::ParseFile($path.FullName, [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) { throw "$($path.FullName) : $($errors[0].Message)" }
          }
          Write-Host "$($paths.Count) scripts parse cleanly."

      - name: Run portable fake-runtime and concurrency suite
        run: |
          New-Item -ItemType Directory -Path '.test-results' -Force | Out-Null
          ./tests/Test-ClaudeWorkforce.ps1 -SkipHostRuntime -TraceStages -TracePath '.test-results/fake-runtime.trace.log' |
            Tee-Object -FilePath '.test-results/fake-runtime.json'
        timeout-minutes: 15

      - name: Upload fake-runtime results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-workforce-fake-runtime-${{ github.run_attempt }}
          path: .test-results/*
          if-no-files-found: warn
          retention-days: 14

      - name: Verify git diff is clean (no whitespace errors)
        run: git diff --check

  remediation:
    name: Full Remediation
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7

      - name: Verify PowerShell version
        run: $PSVersionTable.PSVersion

      - name: Run full remediation suite
        run: |
          New-Item -ItemType Directory -Path '.test-results' -Force | Out-Null
          ./tests/Test-WorkforceRemediation.ps1 |
            Tee-Object -FilePath '.test-results/full-remediation.json'
        timeout-minutes: 15

      - name: Upload remediation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-workforce-full-remediation-${{ github.run_attempt }}
          path: .test-results/*
          if-no-files-found: warn
          retention-days: 14

      - name: Verify git diff is clean (no whitespace errors)
        run: git diff --check
